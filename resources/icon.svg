<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- OCR App icon: magnifier over text lines. Transparent background, line-art only. -->
  <!-- Geometry tuned: handle endpoint (196,180) keeps ~60px right/bottom padding so
       16x16/32x32 taskbar sizes retain the handle without edge clipping. -->
  <!-- Ink text lines -->
  <line x1="48"  y1="72"  x2="208" y2="72"  stroke="#4a453e" stroke-width="8" stroke-linecap="round"/>
  <line x1="48"  y1="104" x2="188" y2="104" stroke="#4a453e" stroke-width="8" stroke-linecap="round"/>
  <line x1="48"  y1="136" x2="208" y2="136" stroke="#4a453e" stroke-width="8" stroke-linecap="round"/>
  <line x1="48"  y1="168" x2="158" y2="168" stroke="#4a453e" stroke-width="8" stroke-linecap="round"/>
  <!-- Vermilion magnifier: ring cx=128 cy=120 r=48 (x 80..176, y 72..168); handle (162,154)->(196,188) -->
  <circle cx="128" cy="120" r="48" fill="none" stroke="#c8442a" stroke-width="10"/>
  <line x1="162" y1="154" x2="196" y2="188" stroke="#c8442a" stroke-width="12" stroke-linecap="round"/>
</svg>
