<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a56;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffdd67;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9a56;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffdd67;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect width="256" height="256" rx="50" fill="url(#bgGrad)"/>

  <!-- Document (3D perspective) -->
  <g transform="translate(60, 30)" filter="url(#shadow)">
    <!-- Document base -->
    <path d="M 0 20 L 10 0 L 130 0 L 140 20 L 140 180 L 0 180 Z"
          fill="white" stroke="none"/>
    <path d="M 0 20 L 10 0 L 130 0 L 140 20 Z"
          fill="#f0f0f0" stroke="none"/>

    <!-- Text lines -->
    <rect x="20" y="50" width="100" height="8" rx="4" fill="url(#lineGrad)"/>
    <rect x="20" y="70" width="80" height="8" rx="4" fill="url(#lineGrad)" opacity="0.8"/>
    <rect x="20" y="90" width="90" height="8" rx="4" fill="url(#lineGrad)" opacity="0.8"/>
    <rect x="20" y="110" width="100" height="8" rx="4" fill="url(#lineGrad)" opacity="0.6"/>
    <rect x="20" y="130" width="75" height="8" rx="4" fill="url(#lineGrad)" opacity="0.6"/>

    <!-- Scanning beam -->
    <rect x="0" y="95" width="140" height="3" fill="white" opacity="0.9">
      <animate attributeName="opacity"
               values="0;0.9;0"
               dur="2s"
               repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="95" width="140" height="1" fill="white">
      <animate attributeName="opacity"
               values="0;1;0"
               dur="2s"
               repeatCount="indefinite"/>
    </rect>
  </g>
</svg>